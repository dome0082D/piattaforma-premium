<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xxxD - Premium Vault</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="login-screen">
        <h1 class="logo-main">xxxD</h1>
        <div class="login-card">
            <input type="email" id="email" placeholder="Inserisci la tua Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="app.login()">ENTRA ORA</button>
        </div>
    </div>

    <div id="app-content" style="display:none">
        <header>
            <span class="logo-nav" onclick="app.showSec('all')">xxxD</span>
            <div class="search-container">
                <input type="text" id="search" placeholder="Cerca nel vault...">
                <i class="fa fa-search"></i>
            </div>
            <div id="user-display" style="color:white; font-weight:bold"></div>
        </header>

        <div style="display:flex">
            <nav class="sidebar">
                <ul>
                    <li onclick="app.showSec('all')"><i class="fa fa-home"></i> Home</li>
                    <li onclick="app.showSec('likes')"><i class="fa fa-heart"></i> I miei Like</li>
                    <li onclick="app.showSec('mine')"><i class="fa fa-upload"></i> I miei Upload</li>
                    <li onclick="app.toggleModal('chat-modal')"><i class="fa fa-comments"></i> Chat & Allegati</li>
                    <li onclick="app.toggleModal('settings-modal')"><i class="fa fa-cog"></i> Impostazioni</li>
                </ul>
                <div class="adv-box">
                    <p>Noleggia Spazio</p>
                    <small>dome0082@gmail.com</small>
                </div>
            </nav>

            <main>
                <div class="upload-section">
                    <input type="text" id="up-title" placeholder="Titolo contenuto...">
                    <input type="file" id="up-file" accept="video/*,image/*">
                    <button id="upload-btn" onclick="app.upload()">CARICA ORA</button>
                    
                    <div id="progress-container" style="display:none; width:100%; background:#ddd; border-radius:10px; margin-top:15px; overflow:hidden;">
                        <div id="progress-bar" style="width:0%; height:20px; background:red; color:white; text-align:center; font-size:12px; line-height:20px; transition: width 0.1s;">0%</div>
                    </div>
                </div>

                <div id="video-grid" class="grid"></div>
            </main>
        </div>

        <div class="quick-controls">
            <i class="fa fa-sun"></i> 
            <input type="range" min="0.3" max="1" step="0.1" value="1" oninput="app.setLight(this.value)">
            <i class="fa fa-volume-up"></i> 
            <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="app.setVol(this.value)">
        </div>
    </div>

    <div id="chat-modal" class="modal">
        <div class="modal-content">
            <h3>Chat & Allegati Premium</h3>
            <div id="chat-box" style="height:250px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px"></div>
            <input type="text" id="chat-msg" placeholder="Scrivi un messaggio...">
            <input type="file" id="chat-file">
            <button onclick="app.sendChat()">Invia</button>
            <button onclick="app.toggleModal('chat-modal')" class="close-btn">Chiudi</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Impostazioni Account</h3>
            <div class="setting-item">
                <label>Qualità Streaming:</label>
                <select><option>Auto (Consigliato)</option><option>1080p</option><option>720p</option></select>
            </div>
            <div class="setting-item">
                <label>Audio:</label>
                <select><option>Stereo</option><option>Surround 5.1</option></select>
            </div>
            <button onclick="app.toggleModal('settings-modal')" class="close-btn">Salva e Chiudi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

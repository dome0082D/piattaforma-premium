<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>xxxD - Premium Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="login-screen">
        <h1 class="main-logo">xxxD</h1>
        <div class="auth-box">
            <input type="email" id="log-email" placeholder="Email">
            <input type="password" id="log-pass" placeholder="Password">
            <button onclick="app.login()">ENTRA</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <header>
            <div class="header-left">
                <span class="logo-red" onclick="app.goHome()">xxxD</span>
            </div>
            <div class="search-box">
                <input type="text" id="search" placeholder="Cerca nel vault...">
                <i class="fa fa-search"></i>
            </div>
            <div class="user-pill" onclick="app.toggleModal('settings-modal')">
                <i class="fa fa-user"></i> <span id="user-name"></span>
            </div>
        </header>

        <div class="layout">
            <nav class="sidebar">
                <ul>
                    <li onclick="app.goHome()"><i class="fa fa-home"></i> Home</li>
                    <li onclick="app.showSection('likes')"><i class="fa fa-heart"></i> I miei Like</li>
                    <li onclick="app.showSection('my-uploads')"><i class="fa fa-cloud-upload"></i> I miei Upload</li>
                    <li onclick="app.toggleModal('chat-modal')"><i class="fa fa-comments"></i> Chat & Allegati</li>
                    <li onclick="app.toggleModal('settings-modal')"><i class="fa fa-cog"></i> Impostazioni</li>
                </ul>
                <div class="adv-space">
                    <p>Noleggia Spazio</p>
                    <small>dome0082@gmail.com</small>
                </div>
            </nav>

            <main>
                <div class="upload-bar">
                    <input type="text" id="up-title" placeholder="Titolo contenuto...">
                    <input type="file" id="up-file">
                    <button onclick="app.upload()">CARICA ORA</button>
                </div>
                <div id="video-grid" class="grid"></div>
            </main>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>Impostazioni Account</h2>
            <div class="setting-row">
                <label>Qualità Video:</label>
                <select id="pref-video"><option>1080p</option><option>720p</option></select>
            </div>
            <div class="setting-row">
                <label>Audio:</label>
                <select id="pref-audio"><option>Surround</option><option>Stereo</option></select>
            </div>
            <button class="close-btn" onclick="app.toggleModal('settings-modal')">Salva e Chiudi</button>
        </div>
    </div>

    <div class="quick-controls">
        <i class="fa fa-sun"></i> <input type="range" oninput="app.setLight(this.value)" min="0.3" max="1" step="0.1">
        <i class="fa fa-volume-up"></i> <input type="range" oninput="app.setVol(this.value)" min="0" max="1" step="0.1">
    </div>

    <script src="script.js"></script>
</body>
</html>

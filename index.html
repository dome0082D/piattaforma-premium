<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>xxxD - Premium Vault</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body id="v-body">
    <header>
        <div class="logo">dome <span class="red">xxxD</span></div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Cerca file..." onkeyup="app.search()">
            <i class="fa fa-search"></i>
        </div>
        <div class="controls">
            <i class="fa fa-sun"></i> <input type="range" id="bright" min="30" max="100" value="100" oninput="app.updateVisual()">
            <i class="fa fa-volume-up"></i> <input type="range" id="vol" min="0" max="100" value="80" oninput="app.updateVisual()">
        </div>
    </header>

    <div class="layout">
        <nav class="sidebar">
            <div onclick="app.load()"><i class="fa fa-home"></i> Home</div>
            <div class="label">CATEGORIE</div>
            <div>Film</div>
            <div>Musica</div>
            <div class="label">PERSONALE</div>
            <div onclick="app.showLikes()"><i class="fa fa-heart"></i> I miei Like</div>
            <div onclick="app.openChat()"><i class="fa fa-comments"></i> Chat & Allegati</div>
        </nav>

        <main class="content">
            <div class="up-bar">
                <input type="text" id="up-title" placeholder="Titolo file...">
                <input type="file" id="up-file">
                <button onclick="app.upload()">CARICA</button>
                <div id="p-wrap" class="p-wrap" style="display:none;">
                    <div id="p-bar" class="p-bar">0%</div>
                </div>
            </div>
            <div id="grid" class="grid"></div>
        </main>
    </div>

    <div id="chat-modal" class="modal">
        <div class="chat-content">
            <h3>Vault Chat</h3>
            <div id="chat-list" class="chat-list"></div>
            <div class="chat-footer">
                <input type="text" id="chat-i" placeholder="Messaggio...">
                <button onclick="app.sendChat()">Invia</button>
            </div>
            <button class="btn-close" onclick="app.closeChat()">Esci</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

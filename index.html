<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>xxxD - Vault Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body id="main-body">

    <div id="login-screen">
        <h1 class="logo-giant">xxxD</h1>
        <div class="login-card">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="app.login()" class="btn-red">ENTRA</button>
            <button onclick="app.login('anonimo')" class="btn-dark">ACCEDI COME ANONIMO</button>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <header>
            <div class="logo-area" onclick="app.showSec('all')">
                <span class="dome-text">dome</span> <span class="xxxd-text">xxxD</span>
            </div>

            <div class="header-controls">
                <div class="control-group">
                    <i class="fa fa-sun"></i>
                    <input type="range" id="bright-range" min="30" max="120" value="100" oninput="app.updateStyle()">
                </div>
                <div class="control-group">
                    <i class="fa fa-volume-up"></i>
                    <input type="range" id="vol-range" min="0" max="100" value="100" oninput="app.updateStyle()">
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="search" placeholder="Cerca..." onkeyup="app.search()">
                <i class="fa fa-search"></i>
            </div>
        </header>

        <nav class="sidebar">
            <ul class="nav-links">
                <li onclick="app.showSec('all')"><i class="fa fa-home"></i> Home</li>
                <li class="nav-label">CATEGORIE</li>
                <li onclick="app.showSec('cat', 'film')">Film</li>
                <li onclick="app.showSec('cat', 'musica')">Musica</li>
                <li class="nav-label">PERSONALE</li>
                <li onclick="app.showSec('likes')">I miei Like</li>
                <li onclick="app.showSec('mine')">I miei Download</li>
                <li class="nav-label">ALTRO</li>
                <li onclick="app.toggleModal('chat-modal')">Chat & Allegati</li>
                <li onclick="app.toggleModal('settings-modal')">Impostazioni</li>
            </ul>

            <div class="online-box">
                <span>ONLINE:</span>
                <div id="online-list"></div>
            </div>

            <div class="adv-banner">
                <p>PUBBLICITÀ</p>
                <small>Noleggia questo spazio:</small>
                <a href="mailto:dome0082@gmail.com">dome0082@gmail.com</a>
            </div>
        </nav>

        <main>
            <div id="upload-zone" class="upload-card">
                <input type="text" id="up-title" placeholder="Titolo file...">
                <input type="file" id="up-file">
                <button onclick="app.upload()">CARICA</button>
                <div id="p-cont" class="progress-container"><div id="p-bar"></div></div>
            </div>

            <div id="video-grid" class="video-grid"></div>
        </main>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>Impostazioni Account</h2>
            <div class="set-row"><strong>Email:</strong> <span id="user-email"></span></div>
            <div class="set-row">
                <input type="password" id="new-pass" placeholder="Nuova Password">
                <button onclick="alert('Password cambiata!')">Aggiorna</button>
            </div>
            <hr>
            <h3>Qualità Video</h3>
            <select id="set-res">
                <option value="720">720p (Standard)</option>
                <option value="1080">1080p (FHD)</option>
            </select>
            <h3>Audio</h3>
            <select id="set-audio">
                <option value="stereo">Stereo</option>
                <option value="surround">Surround 5.1</option>
            </select>
            <button onclick="app.toggleModal('settings-modal')" class="btn-close">Salva e Chiudi</button>
        </div>
    </div>

    <div id="chat-modal" class="modal">
        <div class="modal-content">
            <div id="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chat-msg" placeholder="Messaggio...">
                <input type="file" id="chat-file">
                <button onclick="app.sendChat()">Invia</button>
            </div>
            <button onclick="app.toggleModal('chat-modal')" class="btn-close">Chiudi</button>
        </div>
    </div>

</body>
</html>

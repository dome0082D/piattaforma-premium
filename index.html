<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>xxxD Premium Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2 onclick="app.loadMedia('all')">xxxD</h2>
        <nav>
            <button onclick="app.loadMedia('all')">Home</button>
            <button onclick="app.loadMedia('video')">Video / Film</button>
            <button onclick="document.getElementById('chat-section').scrollIntoView()">Chat</button>
        </nav>
    </div>

    <div class="main">
        <div class="upload-box">
            <input type="text" id="up-title" placeholder="Titolo...">
            <input type="file" id="up-file">
            <button onclick="app.upload()">CARICA</button>
            <div id="p-cont" style="display:none; width:100%; background:#333; margin-top:10px;">
                <div id="p-bar" style="width:0%; background:red; height:20px; text-align:center; color:white;">0%</div>
            </div>
        </div>

        <div id="gallery" class="gallery"></div>

        <div id="chat-section" class="chat-container">
            <h3>Chat Globale</h3>
            <div id="chat-box" class="chat-box"></div>
            <div class="chat-input">
                <input type="text" id="chat-msg" placeholder="Scrivi un messaggio...">
                <button onclick="app.sendChat()">Invia</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>xxxD Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="login-screen" style="text-align:center; padding-top:80px;">
        <h1 class="logo-giant">xxxD</h1>
        <div style="background:black; padding:40px; border-radius:25px; display:inline-block; margin-top:20px;">
            <input type="email" id="email" placeholder="Inserisci Email" style="padding:15px; width:280px; border-radius:5px; border:none;"><br><br>
            <button onclick="app.login()" style="background:red; color:white; border:none; padding:15px 60px; cursor:pointer; font-weight:bold; border-radius:5px;">ENTRA ORA</button>
        </div>
    </div>

    <div id="app-content" style="display:none">
        <header>
            <span style="color:red; font-size:35px; font-weight:900; cursor:pointer;" onclick="location.reload()">xxxD</span>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Cerca nel vault...">
                <i class="fa fa-search" style="color:black"></i>
            </div>
            <div id="user-display" style="font-weight:bold"></div>
        </header>

        <nav class="sidebar">
            <ul>
                <li onclick="app.showSec('all')"><i class="fa fa-home"></i> Home</li>
                <li onclick="app.showSec('likes')"><i class="fa fa-heart"></i> I miei Like</li>
                <li onclick="app.showSec('mine')"><i class="fa fa-download"></i> I miei Download</li>
                <li onclick="app.toggleModal('chat-modal')"><i class="fa fa-comments"></i> Chat & Allegati</li>
                <li onclick="app.toggleModal('settings-modal')"><i class="fa fa-cog"></i> Impostazioni</li>
            </ul>
            <div class="adv-banner">
                <p style="margin:0; font-weight:bold;">PUBBLICITÀ</p>
                <small>dome0082@gmail.com</small>
            </div>
        </nav>

        <main style="margin-left: 280px; padding: 20px;">
            <div style="background:#f0f0f0; padding:20px; border-radius:15px; margin-bottom:20px;">
                <input type="text" id="up-title" placeholder="Titolo Video..." style="padding:10px;">
                <input type="file" id="up-file" style="margin-left:10px;">
                <button onclick="app.upload()" style="background:red; color:white; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">CARICA</button>
                <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar">0%</div></div>
            </div>
            <div id="video-grid" class="video-grid"></div>
        </main>
    </div>

    <div id="chat-modal" class="modal">
        <div class="modal-content">
            <h3>Chat con Allegati</h3>
            <div id="chat-box" style="height:250px; overflow-y:auto; background:#f9f9f9; padding:15px; border:1px solid #ddd; margin-bottom:10px;"></div>
            <input type="text" id="chat-msg" placeholder="Messaggio..." style="width:60%; padding:10px;">
            <input type="file" id="chat-file">
            <button onclick="app.sendChat()" style="background:red; color:white; border:none; padding:10px; margin-top:10px;">Invia</button>
            <button onclick="app.toggleModal('chat-modal')">Chiudi</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>Impostazioni Premium</h3>
            <p>Audio: <select onchange="alert('Audio aggiornato')"><option>Stereo</option><option>Surround 5.1</option></select></p>
            <p>Video: <select onchange="alert('Qualità aggiornata')"><option>1080p</option><option>720p</option><option>4K</option></select></p>
            <button onclick="app.toggleModal('settings-modal')">Salva e Chiudi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
